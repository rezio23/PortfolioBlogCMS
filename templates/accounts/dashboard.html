{% extends 'base.html' %}

{% block title %}Dashboard | {{ site_name }}{% endblock %}

{% block content %}
<h1 class="mb-4">Dashboard</h1>
<div class="row g-4 mb-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100 stat-card">
            <div class="card-body">
                <p class="text-uppercase small text-muted mb-2">Your Blog Posts</p>
                <h2 class="display-6 mb-0">{{ post_count }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100 stat-card">
            <div class="card-body">
                <p class="text-uppercase small text-muted mb-2">Portfolio Projects</p>
                <h2 class="display-6 mb-0">{{ project_count }}</h2>
            </div>
        </div>
    </div>
</div>
<div class="d-flex flex-wrap gap-3">
    <a class="btn btn-dark" href="{% url 'blog:post_create' %}">Write a Post</a>
    <a class="btn btn-outline-dark" href="{% url 'portfolio:project_create' %}">Add a Project</a>
    <a class="btn btn-outline-secondary" href="{% url 'blog:my_posts' %}">Manage My Posts</a>
</div>
{% endblock %}
