{% extends 'base.html' %}

{% block title %}Contact | {{ site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Contact Me</h1>
                <p class="text-muted">Use this form to receive inquiries directly into the database.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
