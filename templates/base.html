{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem("theme");
                var theme = savedTheme === "dark" ? "dark" : "light";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.style.colorScheme = theme;
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "light");
                document.documentElement.style.colorScheme = "light";
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260405-loginfix">
    <link rel="stylesheet" href="{% static 'css/blog.css' %}?v=20260405-loginfix">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v=20260405-loginfix">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}?v=20260405-loginfix">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}?v=20260405-loginfix">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% include 'includes/navbar.html' %}
    <main class="site-main {% block main_class %}py-5{% endblock %}">
        <div class="container">
            {% include 'includes/messages.html' %}
            {% block content %}{% endblock %}
        </div>
    </main>
    {% include 'includes/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}?v=20260405-loginfix"></script>
    <script src="{% static 'js/blog.js' %}?v=20260405-loginfix"></script>
    <script src="{% static 'js/dashboard.js' %}?v=20260405-loginfix"></script>
    <script>
        (function () {
            var root = document.documentElement;
            var themeToggle = document.querySelector("[data-theme-toggle]");

            if (!themeToggle || themeToggle.dataset.themeBound === "true") {
                return;
            }

            var setTheme = function (theme) {
                root.setAttribute("data-theme", theme);
                root.style.colorScheme = theme;

                try {
                    localStorage.setItem("theme", theme);
                } catch (error) {
                    // Ignore storage failures and keep the active theme for the current page.
                }

                var icon = themeToggle.querySelector(".theme-toggle-btn__icon i");
                var label = themeToggle.querySelector(".theme-toggle-btn__label");
                var isDark = theme === "dark";

                themeToggle.setAttribute("aria-pressed", String(isDark));
                themeToggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");

                if (icon) {
                    icon.className = isDark ? "fa-solid fa-sun" : "fa-solid fa-moon";
                }

                if (label) {
                    label.textContent = isDark ? "Light" : "Dark";
                }
            };

            themeToggle.addEventListener("click", function () {
                var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
                setTheme(nextTheme);
            });

            themeToggle.dataset.themeBound = "true";
            setTheme(root.getAttribute("data-theme") === "dark" ? "dark" : "light");
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
