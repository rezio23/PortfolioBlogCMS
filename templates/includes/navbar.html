<nav class="site-navbar navbar navbar-expand-lg">
    <div class="container">
        <div class="site-navbar__inner">
            <a class="navbar-brand site-navbar__brand" href="{% url 'core:home' %}">
                <span class="site-navbar__brand-mark">
                    <i class="fa-solid fa-feather-pointed"></i>
                </span>
                <span class="site-navbar__brand-name">{{ site_name }}</span>
            </a>
            <button class="navbar-toggler site-navbar__toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="site-navbar__toggler-icon">
                    <i class="fa-solid fa-bars-staggered"></i>
                </span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav site-navbar__nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'core:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'core:skills' %}">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'core:services' %}">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blog:blog_list' %}">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact:contact' %}">Contact</a></li>
                </ul>
                <div class="site-navbar__actions d-flex align-items-center gap-2">

                        <a class="btn btn-sm site-action-btn site-action-btn--primary" href="{% url 'accounts:dashboard' %}">Dashboard</a>
                        <a class="btn btn-sm site-action-btn site-action-btn--secondary" href="{% url 'accounts:profile' %}">Profile</a>
                        <form method="post" action="{% url 'logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm site-action-btn site-action-btn--outline">Logout</button>
